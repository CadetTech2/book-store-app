version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: task-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-rootpassword123!}
    ports:
      - '1433:1433'
    volumes:
      - mssql_data:/var/opt/mssql

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: task-server
    restart: unless-stopped
    depends_on:
      - sqlserver
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword123!}
      DB_NAME: ${DB_NAME:-taskdb}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: uploads
    ports:
      - '5000:5000'
    volumes:
      - uploads_data:/app/uploads

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: task-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '3000:80'

volumes:
  mssql_data:
  uploads_data:
