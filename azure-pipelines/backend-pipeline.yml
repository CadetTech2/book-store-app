# Backend CI/CD Pipeline
# Triggers on changes to the server/ folder on main or develop branches
# Note: Adapted trigger path from backend/** to server/** to match repository structure.
trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**
      - Dockerfile.server
      - azure-pipelines/backend-pipeline.yml

variables:
  - group: taskapp-variables
  - name: imageTag
    value: $(Build.BuildId)

stages:
  # ── Stage 1: Build & Push Docker Image ──────────────────
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Step 1: Check out code
          - checkout: self

          # Step 2: Login to Azure Container Registry
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: asimabidconnection

          # Step 3: Build Docker image with the Build ID as the tag
          # Note: Adapted dockerfile path and buildContext to match repository root structure.
          - task: Docker@2
            displayName: 'Build Backend Image'
            inputs:
              command: build
              repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
              dockerfile: Dockerfile.server
              buildContext: $(Build.SourcesDirectory)
              tags: |
                $(imageTag)
                latest

          # Step 4: Push image to ACR
          - task: Docker@2
            displayName: 'Push Backend Image to ACR'
            inputs:
              command: push
              repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
              tags: |
                $(imageTag)
                latest

  # ── Stage 2: Deploy to Dev (from develop branch) ────────
  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        environment: 'development'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Backend to Dev App Service'
                  inputs:
                    azureSubscription: asimservice
                    appName: $(BACKEND_APP_NAME)-dev
                    containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)

  # ── Stage 3: Deploy to Prod (from main branch) ──────────
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Backend to Prod App Service'
                  inputs:
                    azureSubscription: asimservice
                    appName: $(BACKEND_APP_NAME)
                    containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)
