# Frontend CI/CD Pipeline
# Triggers on changes to the client/ folder on main or develop branches
# Note: Adapted trigger path from frontend/** to client/** to match repository structure.
trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - client/**
      - azure-pipelines/frontend-pipeline.yml

variables:
  - group: taskapp-variables

stages:
  # ── Stage 1: Deploy to Dev (from develop branch) ────────
  - stage: DeployDev
    displayName: 'Deploy Frontend to Dev'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        environment: 'development'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  submodules: true

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy Client to Dev SWA'
                  inputs:
                    app_location: '/client'
                    output_location: 'dist'
                    azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_DEV)

  # ── Stage 2: Deploy to Prod (from main branch) ──────────
  - stage: DeployProd
    displayName: 'Deploy Frontend to Prod'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  submodules: true

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy Client to Prod SWA'
                  inputs:
                    app_location: '/client'
                    output_location: 'dist'
                    azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_PROD)
